name: Build Modified APK

on:
  push:
    branches: [ main ]
    paths:
      - 'JL-Mod-JSR-Complete.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract APK sources
        run: |
          unzip -q JL-Mod-JSR-Complete.zip -d apk_sources
          echo "Conteúdo extraído:"
          ls -R apk_sources

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download and setup APKTool
        run: |
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.10.0.jar -O apktool.jar
          sudo mv apktool.jar /usr/local/bin/apktool.jar
          echo '#!/bin/bash' | sudo tee /usr/local/bin/apktool
          echo 'java -jar /usr/local/bin/apktool.jar "$@"' | sudo tee -a /usr/local/bin/apktool
          sudo chmod +x /usr/local/bin/apktool

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0'

      - name: Add Android Build Tools to PATH
        run: echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Rebuild APK with APKTool
        run: |
          # Ajuste o caminho se a pasta extraída tiver outro nome ou subdiretório
          apktool b apk_sources -o rebuilt_unsigned.apk

      - name: Zipalign APK
        run: zipalign -v 4 rebuilt_unsigned.apk rebuilt_aligned.apk

      - name: Generate temporary signing key
        run: |
          keytool -genkey -v \
            -keystore temp-release-key.keystore \
            -alias temp_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass temppassword \
            -keypass temppassword \
            -dname "CN=Anonymous, OU=Anonymous, O=Anonymous, L=Unknown, ST=Unknown, C=XX"

      - name: Sign APK
        run: |
          apksigner sign --ks temp-release-key.keystore \
            --ks-key-alias temp_alias \
            --ks-pass pass:temppassword \
            --key-pass pass:temppassword \
            rebuilt_aligned.apk

      - name: Rename final APK
        run: mv rebuilt_aligned.apk JL-Mod-Modificado.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jl-mod-apk
          path: JL-Mod-Modificado.apk
